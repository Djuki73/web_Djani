<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>following foods and drinks</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #f0f9ff;
            margin: 0;
            flex-direction: column;
            text-align: center;
        }

        .game-container {
            background-color: #fff;
            padding: 2.5rem;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            max-width: 700px; 
            width: 90%;
            animation: fadeIn 1s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            color: #333;
            margin-bottom: 0.5rem;
        }

        p {
            color: #666;
            margin-bottom: 2rem;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            margin-bottom: 2rem;
        }

        .item-box {
            background-color: #ffffff;
            border: 2px solid #ddd;
            border-radius: 10px;
            padding: 1.2rem;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            text-align: center;
            
            /* Menggunakan Flexbox untuk tata letak internal */
            display: flex;
            flex-direction: column;
            align-items: bottom;
            justify-content: space-between; /* Menjaga jarak antara gambar dan teks */
        }

        .item-box:hover {
            border-color: #007bff;
            transform: translateY(-5px);
            box-shadow: 0 5px 15px rgba(0, 123, 255, 0.2);
        }

        .item-box.selected {
            border-color: #007bff;
            transform: scale(1.05);
        }

        .item-box img {
            width: 100%;
            height: auto;
            border-radius: 8px;
            margin-bottom: 10px;
            pointer-events: none;
        }
        
        .item-box span {
            display: block;
            font-weight: bold;
            color: #444;
            margin-top: auto; /* Mendorong teks ke bawah */
        }

        .checkbox {
            position: absolute;
            top: 10px;
            right: 10px;
            width: 25px;
            height: 25px;
            border: 2px solid #aaa;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: white;
            transition: all 0.3s ease;
        }

        .item-box.selected .checkbox {
            background-color: #007bff;
            border-color: #007bff;
        }

        .item-box.selected .checkbox:after {
            content: '✔';
            color: white;
            font-size: 16px;
            font-weight: bold;
        }

        button {
            padding: 12px 25px;
            font-size: 1.1em;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            background-color: #28a745;
            color: white;
            transition: background-color 0.2s, transform 0.2s;
        }

        button:hover {
            background-color: #218838;
            transform: translateY(-2px);
        }

        /* Styling untuk Pop-up */
        .popup-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .popup-content {
            background-color: #fff;
            padding: 2.5rem;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.2);
            animation: bounceIn 0.6s ease-out;
            max-width: 400px;
            position: relative;
        }

        @keyframes bounceIn {
            0% { transform: scale(0.3); opacity: 0; }
            50% { transform: scale(1.1); opacity: 1; }
            100% { transform: scale(1); }
        }

        .popup-content h2 {
            color: #28a745;
            font-size: 2em;
            margin-bottom: 1rem;
        }

        .popup-content p {
            color: #333;
            margin-bottom: 1.5rem;
        }

        .close-btn {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: background-color 0.2s;
        }

        .close-btn:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>

    <div class="game-container">
        <h1>Look at the following foods and drinks.</h1>
        <p>Do you know some of them are from Indonesia? Which ones do you think? Put a check (✔).</p>
        
        <div class="grid-container" id="food-grid">
            <div class="item-box" data-correct="false">
                <img src="img/ayam.png" alt="">
                <span></span>
                <div class="checkbox"></div>
            </div>
            <div class="item-box" data-correct="true">
                <img src="img/cendol.png" alt="">
                <span></span>
                <div class="checkbox"></div>
            </div>
            <div class="item-box" data-correct="false">
                <img src="img/esjeruk.png" alt="">
                <span></span>
                <div class="checkbox"></div>
            </div>
            <div class="item-box" data-correct="true">
                <img src="img/mpek.png" alt="">
                <span></span>
                <div class="checkbox"></div>
            </div>
            <div class="item-box" data-correct="true">
                <img src="img/nasgor.png" alt="">
                <span></span>
                <div class="checkbox"></div>
            </div>
            <div class="item-box" data-correct="false">
                <img src="img/pizza.png" alt="">
                <span></span>
                <div class="checkbox"></div>
            </div>
            <div class="item-box" data-correct="true">
                <img src="img/rendang.png" alt="Pizza">
                <span></span>
                <div class="checkbox"></div>
            </div>
            <div class="item-box" data-correct="true">
                <img src="img/soto.png" alt="">
                <span></span>
                <div class="checkbox"></div>
            </div>
        </div>

        <button id="checkButton">Cek Jawaban</button>
    </div>

    <div id="popupOverlay" class="popup-overlay">
        <div class="popup-content">
            <h2 id="popupTitle"></h2>
            <p id="popupMessage"></p>
            <button class="close-btn" id="closePopup">Tutup</button>
        </div>
    </div>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        const itemBoxes = document.querySelectorAll('.item-box');
        const checkButton = document.getElementById('checkButton');
        const popupOverlay = document.getElementById('popupOverlay');
        const popupTitle = document.getElementById('popupTitle');
        const popupMessage = document.getElementById('popupMessage');
        const closePopupBtn = document.getElementById('closePopup');

        let selectedCount = 0;

        // Fungsi untuk mereset permainan ke kondisi awal
        function resetGame() {
            itemBoxes.forEach(box => {
                box.classList.remove('selected');
            });
            selectedCount = 0;
        }

        // Fungsi untuk menangani klik kotak
        itemBoxes.forEach(box => {
            box.addEventListener('click', () => {
                const isSelected = box.classList.contains('selected');
                
                if (isSelected) {
                    box.classList.remove('selected');
                    selectedCount--;
                } else if (selectedCount < 5) {
                    box.classList.add('selected');
                    selectedCount++;
                } else {
                    alert("Hanya bisa memilih 5 item!");
                }
            });
        });

        // Fungsi untuk memeriksa jawaban
        checkButton.addEventListener('click', () => {
            const selectedItems = document.querySelectorAll('.item-box.selected');
            let isCorrect = true;

            // Memastikan jumlah yang dipilih benar
            if (selectedItems.length !== 5) {
                popupTitle.textContent = "Oops!";
                popupMessage.textContent = "Silakan pilih tepat 5 makanan/minuman.";
                showPopup();
                return;
            }

            // Memeriksa setiap item yang dipilih
            selectedItems.forEach(item => {
                if (item.dataset.correct === "false") {
                    isCorrect = false;
                }
            });

            // Menampilkan pop-up sesuai hasil
            if (isCorrect) {
                popupTitle.textContent = "Selamat!";
                popupMessage.textContent = "Jawabanmu benar! Kalian telah memilih 5 makanan khas Indonesia.";
            } else {
                popupTitle.textContent = "Ups, coba lagi.";
                popupMessage.textContent = "Ada jawaban yang salah. Mohon periksa kembali pilihan Anda.";
            }

            showPopup();
        });

        // Fungsi untuk menampilkan pop-up
        function showPopup() {
            popupOverlay.style.display = 'flex';
        }

        // Fungsi untuk menyembunyikan pop-up DAN mereset game
        closePopupBtn.addEventListener('click', () => {
            popupOverlay.style.display = 'none';
            resetGame();
        });

        // Menyembunyikan pop-up jika area di luar pop-up diklik
        popupOverlay.addEventListener('click', (e) => {
            if (e.target === popupOverlay) {
                popupOverlay.style.display = 'none';
                resetGame();
            }
        });
    });
</script>
</body>
</html>
